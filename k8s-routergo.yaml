apiVersion: v1
kind: Namespace
metadata:
  name: routergo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: routergo
  namespace: routergo
  labels:
    app: routergo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: routergo
  template:
    metadata:
      labels:
        app: routergo
    spec:
      containers:
        - name: routergo
          image: golang:1.24-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - >
              set -e;
              apk add --no-cache git >/dev/null;
              rm -rf /tmp/RouterGo;
              git clone --depth 1 https://github.com/qmish/RouterGo.git /tmp/RouterGo >/dev/null;
              cd /tmp/RouterGo;
              go run ./cmd/router/main.go --config ./config/config.yaml
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1024Mi
---
apiVersion: v1
kind: Service
metadata:
  name: routergo
  namespace: routergo
  labels:
    app: routergo
spec:
  selector:
    app: routergo
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: LoadBalancer
