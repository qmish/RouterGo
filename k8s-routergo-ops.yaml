apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: routergo-pdb
  namespace: routergo
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: routergo
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: routergo-hpa
  namespace: routergo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: routergo
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
